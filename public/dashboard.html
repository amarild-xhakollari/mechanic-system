<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="navbar__content">
            <button class="notification-btn" id="notificationBtn">
                <svg class="notification-icon" fill="none" viewBox="0 0 20 20" aria-hidden="true">
                    <path d="M15 6.66667C15 5.34058 14.4732 4.06881 13.5355 3.13113C12.5979 2.19345 11.3261 1.66667 10 1.66667C8.67392 1.66667 7.40215 2.19345 6.46447 3.13113C5.52678 4.06881 5 5.34058 5 6.66667C5 12.5 2.5 14.1667 2.5 14.1667H17.5C17.5 14.1667 15 12.5 15 6.66667Z" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M11.4417 17.5C11.2952 17.7526 11.0849 17.9622 10.8319 18.1079C10.5789 18.2537 10.292 18.3304 10 18.3304C9.70802 18.3304 9.42115 18.2537 9.16812 18.1079C8.9151 17.9622 8.70475 17.7526 8.55833 17.5" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="notification-badge">2</span>
            </button>

            <div class="vertical-divider"></div>

            <div class="profile-dropdown">
                <button class="profile-btn" id="profileBtn">
                    <span class="profile-text">Profili</span>
                    <svg class="dropdown-arrow" id="dropdownArrow" fill="none" viewBox="0 0 20 20" aria-hidden="true">
                        <path d="M5 7.5L10 12.5L15 7.5" stroke="#454545" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>

                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-header">
                        <div class="user-info">
                            <p class="user-name">User Name</p>
                            <p class="user-role">Administrator</p>
                        </div>
                    </div>
                    <div class="dropdown-item logout" id="logoutBtn">
                        <p class="dropdown-item-text">Dil nga llogaria</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="dashboard-title">Dashboard</h1>
        <p class="dashboard-copy">Welcome to your dashboard</p>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
