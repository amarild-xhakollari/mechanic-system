<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paneli i Klientit</title>
    <link rel="stylesheet" href="css/global.css?v=dash-2">
    <link rel="stylesheet" href="css/dashboard.css?v=client-3">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="navbar__content">
            <ul class="dashboard-nav" aria-label="Navigimi i klientit">
                <li><button class="dashboard-nav__button is-active" type="button" data-tab="vehicles">Vehicle</button></li>
                <li><button class="dashboard-nav__button" type="button" data-tab="jobs">Jobs</button></li>
            </ul>

            <div class="navbar__actions">
                <button class="notification-btn" type="button" aria-label="Notifications" id="notificationBtn">
                    <svg class="notification-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                        <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="notification-badge">0</span>
                </button>
                <span class="navbar__divider" aria-hidden="true"></span>
                <div class="profile-dropdown">
                    <button class="profile-btn" id="profileBtn" type="button" aria-expanded="false">
                        <span class="profile-text">Profili</span>
                        <svg class="dropdown-arrow" id="dropdownArrow" fill="none" viewBox="0 0 20 20" aria-hidden="true">
                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>

                    <div class="dropdown-menu" id="dropdownMenu" role="menu">
                        <div class="dropdown-header">
                            <p class="user-name" data-user-name></p>
                            <p class="user-role">Klient</p>
                        </div>
                        <button class="dropdown-item logout" id="logoutBtn" type="button" role="menuitem">
                            <span class="dropdown-item-text">Dil nga llogaria</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="client-dashboard-panel">
            <header class="client-dashboard-panel__header">
                <div>
                    <p class="client-dashboard-panel__eyebrow">Paneli i klientit</p>
                    <h1 class="client-dashboard-panel__title" data-panel-title>Automjetet</h1>
                </div>
                <p class="client-dashboard-panel__count" data-panel-count>0 artikuj</p>
            </header>

            <div class="client-dashboard-panel__divider">
                <span data-panel-divider>Vehicle</span>
            </div>

            <div class="client-dashboard-panel__scroll">
                <div class="client-dashboard-grid" data-dashboard-list>
                    <p class="dashboard-empty">Duke ngarkuar te dhenat...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/dashboard.js?v=client-3"></script>
</body>
</html>
