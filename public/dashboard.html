<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            width: 100vw;
            height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: relative;
            width: 100%;
            height: 85px;
            background-color: white;
            border-bottom: 0.2px solid #c9c9c9;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            padding: 0 100px;
            gap: 20px;
        }

        /* Notification Button */
        .notification-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #f7f7f7;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .notification-btn:hover {
            background-color: #ececec;
        }

        .notification-icon {
            width: 20px;
            height: 20px;
        }

        .notification-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: #ea3030;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 8px;
            font-weight: 600;
            padding: 1px 4px 2px;
            border-radius: 2px;
            line-height: 1.1;
            min-width: 12px;
            text-align: center;
        }

        /* Vertical Divider */
        .vertical-divider {
            width: 1px;
            height: 34px;
            background-color: #c9c9c9;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: relative;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
            padding: 0 10px;
            background-color: #f7f7f7;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .profile-btn:hover {
            background-color: #ececec;
        }

        .profile-text {
            font-size: 14px;
            font-weight: 600;
            color: #454545;
            white-space: nowrap;
        }

        .dropdown-arrow {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .dropdown-arrow.open {
            transform: rotate(180deg);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            width: 240px;
            background-color: #f7f7f7;
            border-radius: 10px;
            box-shadow: 0px 0px 6px 0px rgba(0, 0, 0, 0.15);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            z-index: 1000;
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            display: flex;
            align-items: center;
            padding: 15px 11px;
            border-radius: 10px 10px 0 0;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #454545;
            line-height: 20px;
        }

        .user-role {
            font-size: 10px;
            font-weight: 400;
            color: #525252;
            line-height: 20px;
            margin-top: 3px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 10px;
            height: 40px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .dropdown-item:hover {
            background-color: #ececec;
        }

        .dropdown-item.logout {
            border-radius: 0 0 10px 10px;
        }

        .dropdown-item-text {
            font-size: 14px;
            font-weight: 500;
            color: #ea3030;
            line-height: 20px;
        }

        /* Main Content */
        .main-content {
            padding: 40px 100px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <!-- Notification Button -->
            <button class="notification-btn" id="notificationBtn">
                <svg class="notification-icon" fill="none" viewBox="0 0 20 20">
                    <path d="M15 6.66667C15 5.34058 14.4732 4.06881 13.5355 3.13113C12.5979 2.19345 11.3261 1.66667 10 1.66667C8.67392 1.66667 7.40215 2.19345 6.46447 3.13113C5.52678 4.06881 5 5.34058 5 6.66667C5 12.5 2.5 14.1667 2.5 14.1667H17.5C17.5 14.1667 15 12.5 15 6.66667Z" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M11.4417 17.5C11.2952 17.7526 11.0849 17.9622 10.8319 18.1079C10.5789 18.2537 10.292 18.3304 10 18.3304C9.70802 18.3304 9.42115 18.2537 9.16812 18.1079C8.9151 17.9622 8.70475 17.7526 8.55833 17.5" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="notification-badge">2</span>
            </button>

            <!-- Vertical Divider -->
            <div class="vertical-divider"></div>

            <!-- Profile Dropdown -->
            <div class="profile-dropdown">
                <button class="profile-btn" id="profileBtn">
                    <span class="profile-text">Profili</span>
                    <svg class="dropdown-arrow" id="dropdownArrow" fill="none" viewBox="0 0 20 20">
                        <path d="M5 7.5L10 12.5L15 7.5" stroke="#454545" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

                <!-- Dropdown Menu -->
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-header">
                        <div class="user-info">
                            <p class="user-name">User Name</p>
                            <p class="user-role">Administrator</p>
                        </div>
                    </div>
                    <div class="dropdown-item logout" id="logoutBtn">
                        <p class="dropdown-item-text">Dil nga llogaria</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-content">
        <h1 style="color: #454545; font-size: 24px; font-weight: 600;">Dashboard</h1>
        <p style="color: #525252; margin-top: 10px;">Welcome to your dashboard</p>
    </div>

    <script>
        // Profile Dropdown Toggle
        const profileBtn = document.getElementById('profileBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const dropdownArrow = document.getElementById('dropdownArrow');

        profileBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
            dropdownArrow.classList.toggle('open');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!dropdownMenu.contains(e.target) && !profileBtn.contains(e.target)) {
                dropdownMenu.classList.remove('show');
                dropdownArrow.classList.remove('open');
            }
        });

        // Logout Button
        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('A jeni i sigurt që dëshironi të dilni nga llogaria?')) {
                alert('Duke dalë nga sistemi...');
                // Here you would typically redirect to login page
                // window.location.href = 'client-page.html';
            }
        });

        // Notification Button
        document.getElementById('notificationBtn').addEventListener('click', function() {
            alert('Ju keni 2 njoftime të reja!');
            // Here you would typically show a notifications panel
        });
    </script>
</body>
</html>
