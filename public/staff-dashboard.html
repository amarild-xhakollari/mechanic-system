<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paneli i Stafit</title>
    <link rel="stylesheet" href="css/global.css?v=dash-2">
    <link rel="stylesheet" href="css/staff-dashboard.css?v=2">
</head>
<body class="staff-dashboard-page">
    <nav class="staff-navbar">
        <div class="staff-navbar__content">
            <ul class="staff-dashboard-nav" aria-label="Navigimi i stafit">
                <li><button class="staff-dashboard-nav__button is-active" type="button" data-staff-tab="active">Active Jobs</button></li>
                <li><button class="staff-dashboard-nav__button" type="button" data-staff-tab="past">Past Jobs</button></li>
            </ul>

            <div class="staff-navbar__actions">
                <button class="staff-navbar__notification" type="button" aria-label="Notifications" data-notification>
                    <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                        <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="staff-navbar__notification-badge">0</span>
                </button>
                <span class="staff-navbar__divider" aria-hidden="true"></span>
                <div class="staff-profile">
                    <button class="staff-profile__button" type="button" aria-expanded="false" data-profile-button>
                        <span>Profili</span>
                        <svg class="staff-profile__chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 15l7-7 7 7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                    <div class="staff-profile__dropdown" role="menu" data-profile-dropdown>
                        <p class="staff-profile__user-name" data-profile-name></p>
                        <p class="staff-profile__user-role">Staff</p>
                        <button class="staff-profile__logout" type="button" role="menuitem" data-logout>Dil nga llogaria</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="staff-dashboard-shell">
        <section class="staff-dashboard-panel">
            <header class="staff-dashboard-panel__header">
                <div>
                    <p class="staff-dashboard-panel__eyebrow">Paneli i stafit</p>
                    <h1 class="staff-dashboard-panel__title" data-staff-name>Punet e mia</h1>
                </div>
            </header>

            <div class="staff-dashboard-panel__summary">
                <div>
                    <p class="staff-dashboard-panel__summary-label">Kodi</p>
                    <p class="staff-dashboard-panel__summary-value" data-staff-code>-</p>
                </div>
                <div>
                    <p class="staff-dashboard-panel__summary-label">Punet</p>
                    <p class="staff-dashboard-panel__summary-value" data-job-count>0</p>
                </div>
            </div>

            <div class="staff-dashboard-panel__divider">
                <span data-staff-divider>Active Jobs</span>
            </div>

            <div class="staff-dashboard-panel__scroll">
                <div class="staff-dashboard-grid" data-staff-jobs>
                    <p class="dashboard-empty">Duke ngarkuar punet...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/staff-dashboard.js?v=2"></script>
</body>
</html>
