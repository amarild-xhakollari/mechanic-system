<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Active Jobs</title>
    <link rel="stylesheet" href="../../components/nav-bar/header-nav.css">
    <link rel="stylesheet" href="../../components/search-bar/search-bar.css">
    <link rel="stylesheet" href="../css/client_common.css">
    <link rel="stylesheet" href="../css/client-active-jobs.css">
    <link rel="stylesheet" href="../css/client-compact.css?v=client-compact-1">
</head>
<body>
    <div class="client-dashboard">
        <header class="header-nav client-nav">
            <div class="header-nav__container">
                <nav class="header-nav__left" aria-label="Client navigation">
                    <ul class="header-nav__menu">
                        <li><a class="header-nav__menu-button is-active" aria-current="page" href="client-active-jobs.html">Punët Aktive</a></li>
                        <li><a class="header-nav__menu-button" href="client-completed-jobs.html">Punet e Përfunduara</a></li>
                        <li><a class="header-nav__menu-button" href="client-profile.html">Të Dhënat e Mia</a></li>
                    </ul>
                </nav>
                <div class="header-nav__actions">
                    <button class="header-nav__notification" type="button" aria-label="Notifications">
                        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                            <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <span class="header-nav__notification-badge">2</span>
                    </button>
                    <span class="header-nav__divider" aria-hidden="true"></span>
                    <div class="profile-dropdown">
                        <button class="profile-btn" type="button" aria-expanded="false" data-profile-button>
                            <span class="profile-text">Client</span>
                            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true" data-profile-arrow>
                                <path d="M5 15l7-7 7 7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <div class="dropdown-menu" role="menu" data-profile-dropdown>
                            <p class="user-name" data-user-name></p>
                            <p class="user-role" data-user-role>Client</p>
                            <button class="dropdown-item" type="button" role="menuitem" data-logout>
                                <span class="dropdown-item-text">Dil nga llogaria</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="client-main">
            <section class="client-hero">
                <h1>Punët në Proces</h1>
                <p>Në këtë seksion mund të shikoni të gjitha punët aktive që po kryhen aktualisht në servis dhe statusin e tyre në kohë reale</p>
            </section>

            <section class="client-jobs-panel" aria-labelledby="client-active-jobs-title">
                <div class="client-jobs-panel__header">
                    <h2 id="client-active-jobs-title">Punet</h2>
                    <div class="client-jobs-panel__search" id="jobs-search"></div>
                </div>
                <div class="client-jobs-panel__scroll">
                    <div class="client-jobs-grid" id="jobs-active"></div>
                </div>
                <p class="client-jobs-panel__count" data-jobs-count>0 pune në total</p>
            </section>
        </main>
    </div>

    <script src="../../components/search-bar/search-bar.js"></script>
    <script src="../js/client_common.js"></script>
    <script src="../js/client-active-jobs.js"></script>
</body>
</html>
