<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profili i perdoruesit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="profile-container">
        <!-- Left Section -->
        <div class="profile-left">
            <div class="profile-header">
                <h2 class="profile-title">Profili i perdoruesit</h2>
                <p class="profile-subtitle">Në këtë panel mund të shikosh të detajet e profilit tend</p>
            </div>

            <div class="profile-info">
                <div class="profile-avatar">
                    <svg class="avatar-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>

                <div class="profile-details">
                    <h3 class="profile-name">Arben Hoxha</h3>
                    <div class="role-badges">
                        <span class="role-badge">Mekanik</span>
                        <span class="role-badge">Mekanik</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Right Section -->
        <div class="profile-right">
            <a href="#" class="edit-link" onclick="editProfile(event)">
                Shiko profilin
                <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </a>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Punet Aktive</div>
                    <div class="stat-value">2</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Punet Totale</div>
                    <div class="stat-value">15</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
