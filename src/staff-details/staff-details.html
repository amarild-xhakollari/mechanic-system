<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detajet e Stafit</title>
  <link rel="stylesheet" href="../frontend_components/back-button/back-button.css" />
  <link rel="stylesheet" href="staff-details.css" />
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a href="#" class="brand">Faqja Kryesore</a>
      <a href="#" class="nav-link active">Pun&euml;t</a>
      <a href="#" class="nav-link">Staff</a>
      <a href="#" class="nav-link">Klientet</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" id="notificationBtn" aria-label="Njoftimet">
        <span class="bell" aria-hidden="true">&#128276;</span>
        <span class="badge">2</span>
      </button>
      <button class="profile-btn" id="profileBtn">
        Profili <span id="chevron">&#8963;</span>
      </button>
      <div class="profile-menu open" id="profileMenu">
        <div class="profile-name">User Name</div>
        <div class="profile-role">Administrator</div>
        <button class="logout">Dil nga llogaria</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="back-button-slot" id="backBtn"></div>

    <section class="panel">
      <h1>Stafi</h1>

      <div class="section-title">
        <span></span>
        <p>Detajet e an&euml;tarit t&euml; stafit</p>
        <span></span>
      </div>

      <div class="staff-card">
        <div class="avatar">
          <span></span>
          <span></span>
        </div>
        <div>
          <h2>Arben Hoxha</h2>
          <p>Kodi : AH001</p>
        </div>
      </div>

      <hr />

      <h3>Detajet e te punesuarit</h3>
      <div class="details-grid">
        <div>
          <label>Email</label>
          <p>arbenhoxha@email.com</p>
        </div>
        <div>
          <label>Nr Telefonit</label>
          <p>0676572237</p>
        </div>
        <div>
          <label>Punet Aktive</label>
          <p id="activeCount">2</p>
        </div>
        <div>
          <label>Punet Totale</label>
          <p>15</p>
        </div>
      </div>

      <hr />

      <div class="roles-wrap">
        <h3>Rolet</h3>
        <div class="roles" id="roles">
          <button>Mekanik</button>
          <button>Mekanik</button>
        </div>
      </div>

      <hr />

      <div class="jobs-header">
        <h3>Punet Aktive</h3>
        <button class="add-btn" id="addJobBtn"><span>&plus;</span> Cakto pun&euml; t&euml; re</button>
      </div>

      <div class="jobs-grid" id="jobsGrid"></div>
    </section>
  </main>

  <div class="toast" id="toast">U hap faqja e list&euml;s</div>

  <div class="modal" id="jobModal" aria-hidden="true">
    <div class="modal-card">
      <h2>Cakto pun&euml; t&euml; re</h2>
      <form id="jobForm">
        <input type="text" id="plate" placeholder="Targa" required />
        <input type="text" id="client" placeholder="Emri i Klientit" required />
        <input type="text" id="mechanic" placeholder="Emri i Mekanikut" required />
        <input type="date" id="date" required />
        <div class="modal-actions">
          <button type="button" class="ghost" id="cancelJob">Anulo</button>
          <button type="submit">Shto</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../frontend_components/back-button/back-button.js"></script>
  <script src="staff-details.js"></script>
</body>
</html>
