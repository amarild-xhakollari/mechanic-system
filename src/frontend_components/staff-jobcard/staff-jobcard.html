<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Member Detail Component</title>
    <link rel="stylesheet" href="../job_minicard/job_minicard.css">
    <link rel="stylesheet" href="staff-jobcard.css">
</head>
<body>
    <div class="demo-wrapper">
        <h1>Staff Member Detail Demo</h1>
        
        <!-- Staff Member Detail Card -->
        <div class="staff-member-detail"></div>
    </div>

    <script src="../job_minicard/job_minicard.js"></script>
    <script src="staff-jobcard.js"></script>
    <script>
        // Example usage with 4 jobs
        const staffMemberData = {
            id: 1,
            name: 'Emër Mbiemër',
            code: 'CODE',
            avatarBg: '#f4b4b4',
            avatarIcon: '#8b2e2e',
            sections: {
                assignedJobs: {
                    title: 'Punët e Caktuara',
                    jobs: [
                        { id: 1, code: 'WX 456 QL', client: 'Erion Meta', date: '10/11/2025' },
                        { id: 2, code: 'KL 123 OP', client: 'Mira Dervishi', date: '11/11/2025' },
                        { id: 3, code: 'BF 456 KL', client: 'Mira Dervishi', date: '12/11/2025' },
                        { id: 4, code: 'WX 456 QL', client: 'Erion Meta', date: '10/11/2025' }
                    ]
                },
                jobsInProcess: {
                    count: 4,
                    label: 'Punë Në Proces'
                },
                positions: {
                    title: 'Pozicionet e punës',
                    roles: ['Montues', 'Teknik']
                }
            }
        };

        const container = document.querySelector('.staff-member-detail');
        createStaffMemberDetail(container, staffMemberData, {
            onJobClick: (job) => {
                console.log('Job clicked:', job);
                alert(`Job: ${job.code}\nClient: ${job.client}\nDate: ${job.date}`);
            },
            onPositionClick: (position) => {
                console.log('Position clicked:', position);
                alert(`Position: ${position}`);
            }
        });
    </script>
</body>
</html>
