<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Audit Logs</title>
    <link rel="stylesheet" href="../../components/nav-bar/header-nav.css">
    <link rel="stylesheet" href="../../components/search-bar/search-bar.css">
    <link rel="stylesheet" href="../../components/audit-logs-panel/audit-card.css?v=audit-card-3">
    <link rel="stylesheet" href="../../components/audit-logs-panel/logs-panel.css?v=audit-panel-3">
    <link rel="stylesheet" href="../../components/export-logs-popup/export-logs-popup.css?v=export-popup-1">
    <link rel="stylesheet" href="../css/admin_dashboard.css">
    <link rel="stylesheet" href="../css/admin_pages.css?v=audit-logs-5">
</head>
<body>
    <div class="admin-dashboard">
        <header class="header-nav">
            <div class="header-nav__container">
                <nav class="header-nav__left" aria-label="Admin navigation">
                    <ul class="header-nav__menu">
                        <li><a class="header-nav__menu-button" href="admin-home.html">Faqja Kryesore</a></li>
                        <li><a class="header-nav__menu-button" href="admin-jobs.html">Punet</a></li>
                        <li><a class="header-nav__menu-button" href="admin-staff.html">Staff</a></li>
                        <li><a class="header-nav__menu-button" href="admin-clients.html">Klientet</a></li>
                        <li><a class="header-nav__menu-button is-active" aria-current="page" href="admin-audit-logs.html">Audit Logs</a></li>
                    </ul>
                </nav>
                <div class="header-nav__actions">
                    <button class="header-nav__notification" type="button" aria-label="Notifications">
                        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                            <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                    <span class="header-nav__divider" aria-hidden="true"></span>
                    <div class="header-nav__profile">
                        <button class="header-nav__profile-button" type="button" aria-expanded="false" data-profile-button>
                            <span>Profili</span>
                            <svg class="header-nav__chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M5 15l7-7 7 7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <div class="header-nav__dropdown" role="menu" data-profile-dropdown>
                            <p class="header-nav__user-name" data-user-name></p>
                            <p class="header-nav__user-role" data-user-role>Administrator</p>
                            <button class="header-nav__logout" type="button" role="menuitem" data-logout>Dil nga llogaria</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-shell">
            <section class="dashboard-panel audit-logs-page-panel">
                <div class="audit-logs-page-panel__header">
                    <h2 class="panel-title admin-section-title">Audit Logs</h2>
                    <div class="audit-logs-page-panel__actions">
                        <div class="panel-search-slot audit-logs-search" id="audit-logs-search"></div>
                        <button class="primary-action audit-logs-export" type="button" data-export-logs>
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                            Export Logs
                        </button>
                    </div>
                </div>
                <div class="audit-logs-filters" aria-label="Filtro audit logs">
                    <label class="audit-logs-filter">
                        <span>Type</span>
                        <select data-audit-filter="type">
                            <option value="all">Te gjitha</option>
                        </select>
                    </label>
                    <label class="audit-logs-filter">
                        <span>Aktori</span>
                        <select data-audit-filter="actorRole">
                            <option value="all">Te gjithe</option>
                            <option value="admin">Admin</option>
                            <option value="staff">Staff</option>
                            <option value="client">Client</option>
                            <option value="system">System</option>
                        </select>
                    </label>
                    <label class="audit-logs-filter">
                        <span>Koha</span>
                        <select data-audit-filter="time">
                            <option value="all">Te gjitha</option>
                            <option value="today">Sot</option>
                            <option value="7days">7 ditet e fundit</option>
                            <option value="30days">30 ditet e fundit</option>
                            <option value="range">Date range</option>
                        </select>
                    </label>
                    <label class="audit-logs-filter audit-logs-filter--date">
                        <span>Nga</span>
                        <input type="date" data-audit-filter="fromDate">
                    </label>
                    <label class="audit-logs-filter audit-logs-filter--date">
                        <span>Deri</span>
                        <input type="date" data-audit-filter="toDate">
                    </label>
                    <button class="panel-filter-button audit-logs-filter-clear" type="button" data-clear-audit-filters>Reset</button>
                </div>
                <div class="audit-logs-page-panel__divider">
                    <span data-audit-logs-label>Aktivitetet e fundit</span>
                </div>
                <div class="audit-logs-page-panel__scroll">
                    <div class="logs-panel" data-audit-logs-panel>
                        <div class="logs-container">
                            <div class="table-header">
                                <div class="header-cell col-type">Type of Log</div>
                                <div class="header-cell col-id">Konteksti</div>
                                <div class="header-cell col-creator">Who / Creator</div>
                                <div class="header-cell col-description">Action / Description</div>
                                <div class="header-cell col-timestamp">Timestamp</div>
                            </div>
                            <div class="logs-list" data-logs-list></div>
                        </div>
                    </div>
                </div>
                <p class="audit-logs-page-panel__count" data-audit-logs-count>0 logs ne total</p>
            </section>
        </main>
        <div class="toast" id="page-toast" role="status" aria-live="polite"></div>
    </div>

    <script src="../../components/search-bar/search-bar.js"></script>
    <script src="../../components/audit-logs-panel/audit-card.js?v=audit-card-3"></script>
    <script src="../../components/audit-logs-panel/logs-panel.js?v=audit-panel-3"></script>
    <script src="../../components/export-logs-popup/export-logs-popup.js?v=export-popup-1"></script>
    <script src="../js/admin_common.js"></script>
    <script src="../js/admin-audit-logs.js?v=audit-logs-5"></script>
</body>
</html>
