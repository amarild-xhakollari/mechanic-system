<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Staff</title>
    <link rel="stylesheet" href="../../components/nav-bar/header-nav.css">
    <link rel="stylesheet" href="../../components/job_minicard/job_minicard.css">
    <link rel="stylesheet" href="../../components/staff-jobcard/staff-jobcard.css">
    <link rel="stylesheet" href="../../components/staff_panel/staff-panel.css">
    <link rel="stylesheet" href="../../components/search-bar/search-bar.css">
    <link rel="stylesheet" href="../css/admin_dashboard.css">
    <link rel="stylesheet" href="../css/admin_pages.css">
</head>
<body>
    <div class="admin-dashboard">
        <header class="header-nav">
            <div class="header-nav__container">
                <nav class="header-nav__left" aria-label="Admin navigation">
                    <ul class="header-nav__menu">
                        <li><a class="header-nav__menu-button" href="admin-home.html">Faqja Kryesore</a></li>
                        <li><a class="header-nav__menu-button" href="admin-jobs.html">Punet</a></li>
                        <li><a class="header-nav__menu-button is-active" aria-current="page" href="admin-staff.html">Staff</a></li>
                        <li><a class="header-nav__menu-button" href="admin-clients.html">Klientet</a></li>
                    </ul>
                </nav>
                <div class="header-nav__actions">
                    <button class="header-nav__notification" type="button" aria-label="Notifications">
                        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                            <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                    <span class="header-nav__divider" aria-hidden="true"></span>
                    <div class="header-nav__profile">
                        <button class="header-nav__profile-button" type="button" aria-expanded="true" data-profile-button>
                            <span>Profili</span>
                            <svg class="header-nav__chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M5 15l7-7 7 7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <div class="header-nav__dropdown is-open" role="menu" data-profile-dropdown>
                            <p class="header-nav__user-name" data-user-name></p>
                            <p class="header-nav__user-role" data-user-role>Administrator</p>
                            <button class="header-nav__logout" type="button" role="menuitem" data-logout>Dil nga llogaria</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-shell">
            <section class="dashboard-hero staff-page-hero">
                <div>
                    <h1 class="dashboard-title">Shiko te gjithe pjesetaret e stafit</h1>
                    <p class="dashboard-subtitle">Ketu mund te shikosh dhe menaxhosh te gjithe pjesetaret e stafit</p>
                </div>
            </section>

            <section class="dashboard-panel staff-page-panel" id="staff-page-panel">
                <div class="staff-page-panel__header">
                    <h2 class="panel-title">Pjesetaret e stafit</h2>
                    <div class="staff-page-panel__actions">
                        <button class="staff-page-panel__filter" type="button" data-staff-filter>
                            <span>Filtro</span>
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="m7 10 5 5 5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <div id="staff-search"></div>
                    </div>
                </div>
                <div class="staff-page-panel__divider">
                    <span>Te gjithe pjesetaret</span>
                </div>
                <div class="staff-page-panel__scroll" id="staff-page-list"></div>
                <p class="staff-page-panel__count" data-staff-count>0 pjesetar stafi</p>
            </section>
        </main>

        <div class="toast" id="page-toast" role="status" aria-live="polite"></div>
    </div>

    <script src="../../components/job_minicard/job_minicard.js"></script>
    <script src="../../components/staff-jobcard/staff-jobcard.js"></script>
    <script src="../../components/search-bar/search-bar.js"></script>
    <script src="../js/admin_common.js"></script>
    <script src="../js/admin-staff.js"></script>
</body>
</html>
