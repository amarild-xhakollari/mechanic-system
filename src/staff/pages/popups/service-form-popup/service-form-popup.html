<form class="staff-service-form service-form-popup" data-service-form>
    <h2 id="service-modal-title">Shto sherbim te kryer per automjetin</h2>
    <p class="staff-service-form__subtitle service-form-popup__subtitle">Vendos te gjitha te dhenat e sherbimit te kryer per automjetin</p>

    <label class="staff-service-form__upload service-form-popup__upload">
        <input type="file" accept="image/*" data-service-image hidden>
        <span class="staff-service-form__preview service-form-popup__preview" data-service-preview></span>
        <span>Kliko ketu per te ngarkuar nje imazh</span>
    </label>

    <label class="staff-service-form__field service-form-popup__field">
        <span>Titulli i sherbimit</span>
        <input data-service-title type="text" placeholder="P.sh. Nderrim vaji">
    </label>

    <label class="staff-service-form__field service-form-popup__field">
        <span>Pershkrimi i sherbimit</span>
        <textarea data-service-note placeholder="Shkruani ketu ..."></textarea>
    </label>

    <div class="staff-service-form__actions service-form-popup__actions">
        <button class="staff-service-button staff-service-button--primary" type="submit">Regjistro Sherbimin</button>
        <button class="staff-service-button staff-service-button--secondary" type="button" data-service-cancel>Anulo</button>
    </div>
</form>
