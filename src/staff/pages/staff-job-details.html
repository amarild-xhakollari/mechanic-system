<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detajet e Punes</title>
    <link rel="stylesheet" href="../../components/nav-bar/header-nav.css">
    <link rel="stylesheet" href="../../components/job_specification_panel/job-specification-panel.css">
    <link rel="stylesheet" href="../../admin/css/admin_dashboard.css">
    <link rel="stylesheet" href="../../admin/css/admin_pages.css">
    <link rel="stylesheet" href="../css/staff_common.css">
    <link rel="stylesheet" href="../css/staff-job-details.css">
</head>
<body>
    <div class="admin-dashboard staff-dashboard">
        <header class="header-nav">
            <div class="header-nav__container">
                <nav class="header-nav__left" aria-label="Staff navigation">
                    <ul class="header-nav__menu">
                        <li><a class="header-nav__menu-button" href="staff-home.html">Faqja Kryesore</a></li>
                        <li><a class="header-nav__menu-button" href="staff-active-jobs.html" data-active-link>Punet Aktive</a></li>
                        <li><a class="header-nav__menu-button" href="staff-completed-jobs.html" data-completed-link>Punet e Kompletuara</a></li>
                        <li><a class="header-nav__menu-button" href="staff-clients.html">Klientet</a></li>
                    </ul>
                </nav>
                <div class="header-nav__actions">
                    <button class="header-nav__notification" type="button" aria-label="Notifications">
                        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
                            <path d="M16 37h16M20 40.5c.9 1.6 2.2 2.5 4 2.5s3.1-.9 4-2.5M11.5 36.5c3-2.8 4.1-5.1 4.1-10.8v-4.2c0-5.1 3.7-9.7 8.4-9.7s8.4 4.6 8.4 9.7v4.2c0 5.7 1.1 8 4.1 10.8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                    <span class="header-nav__divider" aria-hidden="true"></span>
                    <div class="header-nav__profile">
                        <button class="header-nav__profile-button" type="button" aria-expanded="false" data-profile-button>
                            <span>Profili</span>
                            <svg class="header-nav__chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M5 15l7-7 7 7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                        <div class="header-nav__dropdown" role="menu" data-profile-dropdown>
                            <p class="header-nav__user-name" data-user-name></p>
                            <p class="header-nav__user-role" data-user-role>Staff</p>
                            <button class="header-nav__logout" type="button" role="menuitem" data-logout>Dil nga llogaria</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-shell">
            <section class="staff-job-details-toolbar">
                <a class="staff-job-details-toolbar__back" href="staff-active-jobs.html" data-back-link>
                    <span aria-hidden="true">←</span>
                    <span>Kthehu te lista</span>
                </a>
                <div class="staff-job-details-toolbar__actions" data-active-actions>
                    <button class="staff-job-details-toolbar__primary" type="button" data-add-service>
                        <span aria-hidden="true">+</span>
                        <span>Shto Sherbime</span>
                    </button>
                    <button class="staff-job-details-toolbar__secondary" type="button" data-complete-job>
                        Puna Përfundoi
                    </button>
                </div>
            </section>

            <section class="dashboard-panel staff-job-details-page-panel">
                <div id="staff-job-details-panel"></div>
            </section>

            <section class="dashboard-panel staff-service-list-panel" data-service-list-panel>
                <div class="staff-service-list-panel__header">
                    <h2>Sherbimet e kryera</h2>
                </div>
                <div class="staff-service-list-panel__grid" data-service-list></div>
            </section>
        </main>

        <div class="staff-service-modal" data-service-modal hidden>
            <div class="staff-service-modal__scrim" data-service-modal-close></div>
            <div class="staff-service-modal__panel" role="dialog" aria-modal="true" aria-labelledby="service-modal-title">
                <div data-service-modal-content></div>
            </div>
        </div>

        <div class="toast" id="page-toast" role="status" aria-live="polite"></div>
    </div>

    <script src="../js/staff_common.js"></script>
    <script src="popups/confirm-popup/confirm-popup.js"></script>
    <script src="popups/success-popup/success-popup.js"></script>
    <script src="popups/error-popup/error-popup.js"></script>
    <script src="popups/service-popups/service-popups.js"></script>
    <script src="../js/staff-job-details.js"></script>
</body>
</html>
